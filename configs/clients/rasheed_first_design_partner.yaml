client_id: rasheed_first_design_partner
company_name: Neyma Test Freight LLC
simulation_role: first_supervised_design_partner

operator:
  name: Rasheed
  role: owner/operator and controller/payables reviewer

review:
  primary_channel: slack
  follow_up_tone: short_and_direct
  packet_base_url: http://localhost:8000/packets
  evidence_base_url: http://localhost:8000/evidence
  thresholds:
    critical_variance_amount: 100.00
    medium_variance_amount: 25.00

tms:
  mode: mock_first
  system_name: mock_tms_with_customer_system_mapping_later
  browser_automation_allowed_against: mock_tms_only
  live_write_enabled: false
  tms_write_enabled: false
  credentials_storage: none
  session_policy: human_established_session_only
  screen_map_path: configs/tms/rasheed_first_design_partner_screen_map.json

pilot:
  scope: carrier_invoice_reconciliation
  supervised: true
  live_sends_enabled: false
  autonomous_tms_write_enabled: false
  input_mode: synthetic_email_corpus
  review_mode: slack_first
  carrier_email_send_mode: draft_only_send_gate
  success_metrics:
    - email_ingestion_packet_link_accuracy
    - email_ingestion_doc_type_accuracy
    - slack_review_messages_created
    - signed_action_applied
    - callback_action_applied
    - mock_tms_readback_verified
    - mock_tms_write_verified
    - no_real_tms_write

delivery:
  default_channel: slack
  action_token_secret_env: NEYMA_DELIVERY_SECRET_RASHEED_FIRST
  slack:
    enabled: true
    outbound_enabled: false    # off by default (non-negotiable #6); flip on at runtime for a live pilot post
    signing_secret_env: NEYMA_SLACK_SIGNING_SECRET_RASHEED_FIRST
    bot_token_env: NEYMA_SLACK_BOT_TOKEN_RASHEED_FIRST
    default_channel_id: C0BB8KG21J8
    routing:
      IMMEDIATE_PING: C0BB8KG21J8
      CHANNEL_POST: C0BB8KG21J8
      DIGEST_ONLY: C0BCXGPAD2B
  # Slack is the headless UI: review/approval/evidence go to Slack ONLY. Email is NOT a review
  # channel for the user. Email's real role is inbound intake (the agent lives in the inbox and
  # ingests documents) plus carrier-facing follow-ups — both separate from this delivery block.
  email:
    enabled: false                 # do not send review cards to the user's email
    sender: no-review-email@neyma.local
    to:
      - rasheed@neyma.local        # local/dev artifact only if this channel is ever re-enabled
    action_base_url: http://localhost:8000/email/action
    outbound_enabled: false

carrier_follow_up_email:
  mode: draft_only_send_gate
  purpose: carrier-facing dispute and missing-backup emails only
  live_send_enabled: false
  from_env: NEYMA_CARRIER_FOLLOW_UP_FROM
  smtp_host_env: NEYMA_CARRIER_FOLLOW_UP_SMTP_HOST
  smtp_user_env: NEYMA_CARRIER_FOLLOW_UP_SMTP_USERNAME
  smtp_password_env: NEYMA_CARRIER_FOLLOW_UP_SMTP_PASSWORD
