# Canonical Expected Identifiers — the REGISTERED set for exact-set equality.
#
# Errata 2026-07-16. These lists are the "registered expected identifiers" leg of the three-way
# oracle required by the errata brief:
#
#     enumerated canonical identifiers == registered expected identifiers == acceptance-mapped
#
# COUNTS ARE DIAGNOSTICS, NOT THE ORACLE. A count match with different members MUST fail. That is
# why this file lists every identifier by name rather than asserting 134 and 98: the whole class of
# defect being corrected here was a NUMBER that had drifted away from the members it claimed to
# count. A guard that checks only the number would have agreed with the wrong total forever.
#
# Regenerate deliberately, never automatically: a change here must be a decision, not a side effect.

