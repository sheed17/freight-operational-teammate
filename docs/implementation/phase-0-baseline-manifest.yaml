# ---------------------------------------------------------------------------------------------
# EXPECTED_LEGACY_PATH - the ungated live-write paths. NOT contained. See R-07 / PL-18.
# ---------------------------------------------------------------------------------------------
expected_legacy_paths:
  reason: >-
    These paths can execute real external effects with no checkpoint, no witness, and no grant.
    Phase 0 makes them visible. It does not make them safe.
  risk_id: R-07
  status: OPEN - NOT CONTAINED
  removed_by_phase: P4
  accountable_unit: U4.6 (delete), U4.7 (de-actuate), U4.8 (convert)
  deletion_condition: >-
    EP-6/7/9/10 are physically deleted, orient_tms loses its actuator import, EP-1/EP-3 are pipeline
    clients, and the U4.9 import gate is ON.
  containment_mechanism: >-
    NONE. Until P4 the only mitigation is the operator's one-writer-at-a-time discipline, which is
    discipline, not a mechanism. This entry may never be read as containment.
  effect_capable_by_import:
    - script: scripts/enter_invoice_discovered.py
      ep: EP-7
      cutover: REMOVE_BEFORE_ENABLE
    - script: scripts/enter_tms_payable.py
      ep: EP-12
      cutover: test-only (mock-guarded)
    - script: scripts/enter_truckingoffice_invoice.py
      ep: EP-6
      cutover: REMOVE_BEFORE_ENABLE
    - script: scripts/orient_tms.py
      ep: EP-8
      cutover: MAKE_READ_ONLY (remove the cdp_actuator import)
      note: read-only by convention, actuator-capable by import
    - script: scripts/propose_ar_from_tms.py
      ep: EP-3
      cutover: CONVERT_TO_PIPELINE_CLIENT
    - script: scripts/read_tms_browser_use.py
      ep: UNLISTED
      cutover: CLASSIFY
      note: >-
        Not present in the frozen EP-1..EP-13 inventory. Imports browser_use_adapter. Finding P0-F4.
    - script: scripts/run_action_callback_server.py
      ep: EP-1
      cutover: CONVERT_TO_PIPELINE_CLIENT
    - script: scripts/run_dogfood_pilot.py
      ep: EP-13
      cutover: test-only (mock-guarded)
    - script: scripts/run_operate_request.py
      ep: EP-9
      cutover: REMOVE_BEFORE_ENABLE
    - script: scripts/run_operator_agent.py
      ep: EP-10
      cutover: REMOVE_BEFORE_ENABLE
  references_to_effect_capable:
    - script: scripts/run_teammate.py
      references:
        - scripts/propose_ar_from_tms.py
        - scripts/run_action_callback_server.py
      classification: SPAWNS
      note: >-
        EP-2, the supervisor. Effect-capable ONLY by spawn, which an import-only guard cannot see.
    - script: scripts/run_sunday_readiness.py
      references:
        - scripts/run_action_callback_server.py
      classification: DOCUMENTS
      note: >-
        Emits the command as a runbook STRING for a human to copy. Launches nothing. Adjudicated as
        not effect-capable. A first version of this probe guessed SPAWNS here and was wrong.

# ---------------------------------------------------------------------------------------------
# EXPECTED_DEPRECATED_TERM - recorded and frozen at these counts. Phase 0 renames nothing.
# ---------------------------------------------------------------------------------------------
expected_deprecated_terms:
  reason: >-
    Names follow behaviour. Each rename is the LAST commit of the phase that made the name true.
    Renaming earlier produces code that reads canonical and behaves legacy.
  counting_rule: >-
    PRODUCTION occurrences only: word-boundary matches in src/ and scripts/ (.py). This is the
    surface P8's rename must migrate, and the only one the ratchet governs.

    REVISED IN PHASE 1, because the previous rule (src + scripts + eval/tests, minus the phase guards)
    measured the wrong thing and said so out loud: `commit_identity` reached ZERO in production - U1.6
    complete, the whole point of the unit - while the combined total read 2, both inside a guard whose
    job is to assert `"def _commit_identity(" not in source`. Naming a deleted symbol in order to
    forbid it is the opposite of a regression, and a rule that scores it as one only teaches people to
    silence the rule.

    Tests are counted separately (test_counts) and TRACKED, not ratcheted: a test's vocabulary is
    derivative of the API it exercises, it entrenches nothing, and P8 sweeps it along with the code.
  deletion_condition: each count must reach 0 at its phase; counts may only DECREASE
  # The files that already use deprecated vocabulary. CONTAINMENT, not counting: a term may keep
  # breathing where it already lives, but reaching a NEW file is prohibited. Recorded because the
  # Phase-1 rewrite proved a raw count ratchet mislabels legitimate work as a regression - and a
  # guard that cries wolf gets re-baselined into meaninglessness.
  owning_files:
    - scripts/enter_tms_payable.py
    - scripts/propose_ar_from_tms.py
    - scripts/propose_operation_to_slack.py
    - scripts/report_legacy_commit_identities.py
    - scripts/run_action_callback_server.py
    - scripts/run_dogfood_pilot.py
    - scripts/run_gmail_to_slack_dogfood.py
    - scripts/run_mailbox_workflow.py
    - scripts/run_operate_request.py
    - src/freight_recon/action_callback.py
    - src/freight_recon/activity_log.py
    - src/freight_recon/brain_operator.py
    - src/freight_recon/browser_use_adapter.py
    - src/freight_recon/cdp_actuator.py
    - src/freight_recon/cdp_session.py
    - src/freight_recon/commit_key.py
    - src/freight_recon/email_triage.py
    - src/freight_recon/inbox_brain.py
    - src/freight_recon/lane_graduation.py
    - src/freight_recon/mailbox_workflow.py
    - src/freight_recon/mock_tms_write_server.py
    - src/freight_recon/operation_proposal.py
    - src/freight_recon/operation_router.py
    - src/freight_recon/operator_agent.py
    - src/freight_recon/ops_control.py
    - src/freight_recon/roi_ledger.py
    - src/freight_recon/slack_delegate.py
    - src/freight_recon/thread_reply.py
    - src/freight_recon/tms_write.py
    - src/freight_recon/truckingoffice_write.py
    - src/freight_recon/workflow.py
  terms:
    - term: lane
      count: 227
      canonical: action_class | workflow_id | policy scope
      removed_by_phase: P8
      accountable_unit: U8.5
      note: >-
        Three meanings in one word. The largest mechanical change in the plan, deliberately last.
        PRODUCTION baseline @ d33f251 was 257; Phase 1 brought it to 227 - DOWN 30, because deleting
        the amount-keyed derivation took its lane-shaped parameters with it. The new module
        commit_key.py is lane-free apart from one comment naming the concept it will replace.
    - term: CommandIntent
      count: 57
      canonical: Proposal / Effect Request
      removed_by_phase: P8
      accountable_unit: U8.6
      note: >-
        PRODUCTION baseline @ d33f251 was 56; Phase 1 made it 57 (+1, in operation_router.py, whose
        types ARE CommandIntent-based until P8 renames them - out of Phase-1 scope). ADJUDICATED.
    - term: MockTmsWriteLedger
      count: 14
      canonical: spec-derived contract simulator
      removed_by_phase: P3
      accountable_unit: U3.5
    - term: workflow_runs
      count: 17
      canonical: Work Item + Pipeline Instance (SPLIT, never merged back)
      removed_by_phase: P6
      accountable_unit: U6.4
    - term: commit_identity
      count: 0
      canonical: Commit Key
      removed_by_phase: P1
      accountable_unit: U1.6
      note: >-
        PRODUCTION: 14 at baseline @ d33f251 -> 0. U1.6 is COMPLETE. Phase 1 replaced the producer
        and every consumer with the canonical Commit Key. The term survives in production only inside
        the compound "historical_commit_identity", an escalation payload field NAMING the legacy
        concept it reports on - a substring, not a word-boundary use.
    - term: operation_action_claims
      count: 2
      canonical: approval consumption
      removed_by_phase: P3
      accountable_unit: U3.2

# ---------------------------------------------------------------------------------------------
# EXPECTED_ACCEPTANCE_FAILURE - red on purpose. Not skipped, not xfailed into silence.
# ---------------------------------------------------------------------------------------------
expected_acceptance_failures:
  - case: AC-SAFE-012
    status: GREEN_AT_P1
    reason: >-
      WAS red by design (the amount was in the commit identity, DEF-1). Phase 1 removed it: the key
      is derived from LogicalEffect, which has no amount field. Now an ordinary passing test, proved
      end-to-end against the real router by actuator call count - not by a stub.
    green_at_phase: P1
    accountable_unit: U1.2
  - case: AC-SAFE-013
    status: GREEN_AT_P1
    reason: >-
      WAS red by design (non-money effects got no commit identity, DEF-2). Phase 1 gives every
      consequential effect a key AND makes will_commit cover non-money effects, so the reservation
      path actually engages. Proved by filing the same POD twice and counting uploads.
    green_at_phase: P1
    accountable_unit: U1.3
  - case: AC-SEC-001
    status: RED_BY_DESIGN
    reason: 7 of 8 tables are not tenant-first (DEF-6)
    green_at_phase: P2
    accountable_unit: U2.1
  - case: AC-CKPT-6-missing
    status: DEFERRED_BY_DEPENDENCY - REQUIRED AT PHASE 8
    reason: >-
      The case asserts that an action class with a NULL policy gate fails to start. Typed policy and
      action classes do not exist until P8; the current model has lanes with a fail-safe default,
      not a NOT-NULL gate. Running this probe today would evaluate ZERO gates and report green - the
      exact false-green M-9 pattern. It is therefore declared not-yet-executable rather than passed.
      See finding P0-F1: the frozen plan lists U0.3 as a Phase-0 unit, which is not achievable.
    green_at_phase: P8
    accountable_unit: U8.1

