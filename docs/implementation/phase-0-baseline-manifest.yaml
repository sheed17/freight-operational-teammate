# Phase-0 Baseline Manifest
#
# The adjudicated record of what is TRUE about this repository today. Every Phase-0 guard RECOMPUTES
# these facts and compares them here. A changed fact fails the build and requires a human to change
# this file deliberately - that is the whole mechanism.
#
# This manifest does not make anything safe. Several entries below record that the repository is
# UNSAFE, on purpose, so that the unsafe state cannot drift or be forgotten. An allowance here is
# not containment; it is a receipt for a known hole, with a named owner and a deletion condition.
#
# RULE: no indefinite allowance. No wildcard allowance. No allowance justified only as "legacy".

baseline:
  commit: 9f20b25
  recon_commit: 6057dfe
  tests_passing_at_baseline: 677
  test_count_rule: >-
    The guard direction is >=. Tests may be added freely; a DROP in the collected count is a hard
    failure. Silently losing a test is how a guard disappears without anyone deciding to remove it.

# ---------------------------------------------------------------------------------------------
# REQUIRED_INVARIANT - true now and forever. Breaking one is a hard failure, not a delta.
# ---------------------------------------------------------------------------------------------
required_invariants:
  - id: INV-P0-1
    rule: every Phase-0 probe reports its evaluated count and fails on an empty population
    reason: a checker that parsed nothing has proven nothing (planning review M-9)
    accountable_unit: U0.5
  - id: INV-P0-2
    rule: no production entry point may execute a financial effect against a mock
    reason: finding R-01, the archetype defect. Already green; must never regress.
    accountable_unit: pre-existing (test_no_mock_effect_in_production)
  - id: INV-P0-3
    rule: a CONSEQUENTIAL_FRESHNESS_READ may not accept a cache
    reason: guard V-3. Already green by negative control.
    accountable_unit: pre-existing (test_consequential_read_boundary)
  - id: INV-P0-4
    rule: every completion oracle must resolve to a canonical acceptance case id
    reason: the invented AC-SEC-000 oracle (planning review M-1) named a test that did not exist
    accountable_unit: U0.6
  - id: INV-P0-5
    rule: G4 must resolve through Phase 8
    reason: planning review M-3. An under-scoped G4 is a path to an ungated live write.
    accountable_unit: U0.7

# ---------------------------------------------------------------------------------------------
# EXPECTED_CURRENT_DEFECT - real defects, adjudicated, allowed ONLY until the named phase.
# ---------------------------------------------------------------------------------------------
expected_current_defects:
  - id: DEF-1
    status: CLOSED 2026-07-16 by Phase 1 (U1.1/U1.2). Forward-only - may never be restored.
    fact: operation_router.py::_commit_identity includes approved_amount in the commit identity
    reason: >-
      The live defect that Migration Safety Task 1 exists to fix. The amount belongs in the
      Material-Facts Fingerprint, never in the identity of the effect.
    risk_id: R-02
    acceptance: AC-SAFE-012
    removed_by_phase: P1
    accountable_unit: U1.2
    deletion_condition: AC-SAFE-012 flips red to green and no amount reaches any key derivation

  - id: DEF-2
    status: CLOSED 2026-07-16 by Phase 1 (U1.3). Forward-only - may never be restored.
    fact: operation_router.py::_commit_identity returns None when there is no amount
    reason: >-
      Non-money effects (filing a POD) get no commit identity, so their single-commitment cannot be
      enforced or proven.
    risk_id: R-02
    acceptance: AC-SAFE-013
    removed_by_phase: P1
    accountable_unit: U1.3
    deletion_condition: AC-SAFE-013 green and a non-money effect mints a key

  - id: DEF-3
    status: >-
      CLOSED 2026-07-16 by Phase 1 (U1.4). NOTE: the frozen plan named test_lane_graduation.py:206,
      which encodes the NULLABLE-identity defect (DEF-2). The amount-in-key assertion actually lived
      in test_operation_router.py:282 (test_operation_commit_key_normalizes_equivalent_money_amounts,
      which passed approved_amount= into the key derivation). BOTH were inverted. See the Phase-1
      review, finding P1-F1.
    fact: eval/tests/test_lane_graduation.py encodes the amount-in-key defect as expected behaviour
    reason: a test asserting the defect will fight the fix
    risk_id: R-02
    acceptance: AC-SAFE-012
    removed_by_phase: P1
    accountable_unit: U1.4
    deletion_condition: the assertion is inverted and cannot be restored without failing AC-SAFE-012

  # --- Defects found BY Phase 0, in the frozen corpus itself. These block G1/G2, not P1. ---
  - id: DEF-4
    fact: >-
      The frozen corpus declares 141 machine transitions. The 13 machine files enumerate 134, and
      the acceptance spec's OWN per-machine table sums to 134.
    reason: >-
      An arithmetic error propagated to six places, including release gate G1 ("141/141") and
      AC-MACH-000 ("a bijection with the 141 spec rows"). A correct implementation of all 134 spec
      transitions would FAIL that bijection forever. Both tempting fixes are bad: invent 7
      transitions, or weaken the bijection to an inequality.
    risk_id: P0-F2
    acceptance: AC-MACH-000
    status: CORRECTED 2026-07-16 by the Canonical Corpus Errata Pass
    removed_by_phase: P0 (errata) - CLOSED
    accountable_unit: U0.8
    deletion_condition: >-
      CLOSED: the corpus was amended to its own enumeration (134). The transitions were NOT invented
      and the bijection was NOT weakened. The probe now asserts EXACT SET EQUALITY, not a count.

  - id: DEF-5
    fact: >-
      The frozen corpus declares 92 emitted events. The canonical event list (events/registry.md
      section 3) enumerates 98 across F1..F13.
    reason: >-
      Same class as DEF-4. F14 (13 security events) is correct. F15 is a lens and declares no
      contracts. AC-EVT-003 asserts a "141 to 92 map" - both numbers are wrong.
    risk_id: P0-F2
    acceptance: AC-EVT-003
    status: CORRECTED 2026-07-16 by the Canonical Corpus Errata Pass
    removed_by_phase: P0 (errata) - CLOSED
    accountable_unit: U0.8
    deletion_condition: >-
      CLOSED: the corpus was amended to its own enumeration (98). No events were invented to preserve
      the old total. The probe now asserts EXACT SET EQUALITY over event names.

  - id: DEF-6
    fact: >-
      The frozen plan states "6 of 8 tables are not tenant-first" in seven places. Exactly one table
      (autonomous_run_counters) is tenant-first, so the true count is 7 of 8.
    reason: >-
      Not a harmless typo. U2.1 is scoped to "the 6 offending tables". Executed literally, Phase 2
      would migrate 6, leave 1 non-tenant-first, and AC-SEC-001 would stay red with the phase marked
      done.
    risk_id: R-06
    acceptance: AC-SEC-001
    removed_by_phase: P2
    accountable_unit: U2.1
    scope_corrected: >-
      2026-07-16 errata: every normative statement now says 7 of 8, and U2.1 is scoped by the EXACT
      SET of seven tables enumerated in migration-plan.md PART 7 - never by count. The SCHEMA itself
      is unchanged and still non-canonical; only the scope statement was wrong and is now right.
    deletion_condition: all 8 tables are tenant-first and AC-SEC-001 is green

# ---------------------------------------------------------------------------------------------
# EXPECTED_NONCANONICAL_SCHEMA - recorded, not migrated. Phase 0 changes no schema.
