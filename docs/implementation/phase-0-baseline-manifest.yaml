  - id: REG-3
    rule: no new effect-capable entry point without a classification in this manifest
    detected_by: test_phase0_entry_points
  - id: REG-4
    rule: no new use of a deprecated term; counts may only decrease
    detected_by: test_phase0_deprecated_semantics
  - id: REG-5
    rule: no invented acceptance identifier may be used as a completion oracle
    detected_by: test_phase0_identifiers
  - id: REG-6
    rule: G4 may not be reduced to P2-P4 or omit any AC-SAFE case
    detected_by: test_phase0_planning_graph
  - id: REG-7
    rule: no checker may report green after evaluating zero records
    detected_by: test_phase0_evaluation_contract
  - id: REG-8
    rule: a module classified read-only may not import an actuator
    detected_by: test_phase0_entry_points

